<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Item — LER³</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .topbar {
            background: linear-gradient(135deg, #00BFFF, #0090cc);
            padding: 14px 24px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .topbar h1 { color: white; font-size: 1.5rem; margin: 0; font-weight: bold; }
        .card-header-dark { background-color: #1a1a2e; color: white; }
        .btn-ler { background-color: #00BFFF; color: #000; font-weight: bold; }
        .btn-ler:hover { background-color: #0090cc; color: white; }
    </style>
</head>
<body>

    <div class="topbar d-flex align-items-center justify-content-between">
        <h1>⚗ Laboratório LER³</h1>
        <a href="/" class="btn btn-outline-light">← Voltar ao inventário</a>
    </div>

    <div class="container mt-4" style="max-width: 700px;">
        <div class="card shadow-sm">
            <div class="card-header card-header-dark">
                <strong>Cadastrar novo item</strong>
            </div>
            <div class="card-body">
                <form action="/cadastrar" method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Nome *</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <input type="text" name="descricao" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <div class="d-flex gap-2">
                            <select name="categoria_id" id="categoria_id" class="form-select">
                                <option value="">— Selecione —</option>
                                {% for categoria in categorias %}
                                    <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
                                {% endfor %}
                            </select>
                            <button type="button" class="btn btn-outline-success" onclick="criarCategoria()">+ Nova</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subcategoria</label>
                        <div class="d-flex gap-2">
                            <select name="subcategoria_id" id="subcategoria_id" class="form-select">
                                <option value="">— Selecione —</option>
                            </select>
                            <button type="button" class="btn btn-outline-success" onclick="criarSubcategoria()">+ Nova</button>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Condição</label>
                            <select name="condicao" class="form-select">
                                <option value="funcionando">Funcionando</option>
                                <option value="nao_funcionando">Não funcionando</option>
                                <option value="em_manutencao">Em manutenção</option>
                                <option value="condicao_variada">Condição variada</option>
                                <option value="sem_status">Sem status</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Disponibilidade</label>
                            <select name="disponibilidade" class="form-select">
                                <option value="disponivel">Disponível</option>
                                <option value="em_uso">Em uso</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Quantidade</label>
                            <input type="number" name="quantidade" class="form-control" value="1" min="0" step="0.1">
                        </div>
                        <div class="col">
                            <label class="form-label">Unidade de medida</label>
                            <select name="unidade_medida" class="form-select">
                                <option value="unidade">Unidade(s)</option>
                                <option value="kg">Kg</option>
                                <option value="metro">Metro(s)</option>
                                <option value="litro">Litro(s)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Patrimônio UTFPR</label>
                            <select name="patrimonio_utfpr" class="form-select">
                                <option value="nao">Não</option>
                                <option value="sim">Sim</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Patrimônio de Escola</label>
                            <select name="patrimonio_escola" id="patrimonio_escola" class="form-select" onchange="toggleEscola()">
                                <option value="nao">Não</option>
                                <option value="sim">Sim</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3" id="campo_escola" style="display:none;">
                        <label class="form-label">Nome da Escola</label>
                        <input type="text" name="nome_escola" class="form-control" placeholder="ex: Escola Estadual João da Silva">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Vincular a item pai (opcional)</label>
                        <select name="item_pai_id" class="form-select">
                            <option value="">— Nenhum —</option>
                            {% for item in itens_pai %}
                                <option value="{{ item.id }}">{{ item.nome }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">Use para registrar um item específico dentro de um montante. Ex: Mouse Richtech dentro de Caixa de Mouses.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Foto do item (opcional)</label>
                        <input type="file" name="imagem" class="form-control" accept="image/*">
                    </div>

                    <hr>
                    <p class="text-muted fw-bold mb-3">Localização (opcional)</p>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Ambiente</label>
                            <input type="text" name="ambiente" class="form-control" placeholder="ex: Laboratório principal">
                        </div>
                        <div class="col">
                            <label class="form-label">Código de etiqueta</label>
                            <input type="text" name="codigo_etiqueta" class="form-control" placeholder="ex: LER-001">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="/" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-ler">Salvar item</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleEscola() {
            const val = document.getElementById('patrimonio_escola').value;
            document.getElementById('campo_escola').style.display = val === 'sim' ? 'block' : 'none';
        }

        document.getElementById('categoria_id').addEventListener('change', function () {
            const categoria_id = this.value;
            const subSelect = document.getElementById('subcategoria_id');
            subSelect.innerHTML = '<option value="">— Selecione —</option>';
            if (categoria_id) {
                fetch('/subcategorias/' + categoria_id)
                    .then(r => r.json())
                    .then(subs => {
                        subs.forEach(sub => {
                            const opt = document.createElement('option');
                            opt.value = sub.id;
                            opt.textContent = sub.nome;
                            subSelect.appendChild(opt);
                        });
                    });
            }
        });

        function criarCategoria() {
            const nome = prompt('Nome da nova categoria:');
            if (!nome) return;
            fetch('/categoria/criar-inline', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome })
            })
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('categoria_id');
                const opt = document.createElement('option');
                opt.value = data.id;
                opt.textContent = data.nome;
                select.appendChild(opt);
                select.value = data.id;
            });
        }

        function criarSubcategoria() {
            const categoria_id = document.getElementById('categoria_id').value;
            if (!categoria_id) { alert('Selecione uma categoria primeiro.'); return; }
            const nome = prompt('Nome da nova subcategoria:');
            if (!nome) return;
            fetch('/subcategoria/criar-inline', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, categoria_id: parseInt(categoria_id) })
            })
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('subcategoria_id');
                const opt = document.createElement('option');
                opt.value = data.id;
                opt.textContent = data.nome;
                select.appendChild(opt);
                select.value = data.id;
            });
        }
    </script>
</body>
</html>
